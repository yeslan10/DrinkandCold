<!DOCTYPE html>
<html lang="fr" data-theme="dark"> 
    <head>
        
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>drinkandcold - Connexion</title>
        <!-- link -->
        <link rel="stylesheet" href="../css/pico.indigo.css">
        <link rel="stylesheet" href="../css/style.css">
        <link rel="icon" href="../img/icone/360_F_695823409_EfMuGZeDX3PyImMtJ2gAzDcxINg8VkFz.jpg" type="image\x-icon">
</head>
<body >
    <!-- header -->
    <header class="container">
         <nav>
            <ul>
                <li><img src="../img/icone/390166.png" alt="icone" class="logo"></li>
            </ul>
            <ul>
                <li><a href="../index.html">Retour au menu</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="inscription.html"> Inscription</a></li>
            </ul>
        </nav>

        <h1><strong>DrinkandCold</strong></h1>
        <p><strong>Site créé par Nolan De Almeida</strong></p>
        <i>Be Fraîche</i>
        <hr>

    </header>
    <!-- page principale -->
    <main class="container">

        <h2 class="menu_princ">Connectez - Vous !</h2>
        <p><strong>Veuillez remplire les cases manquantes.</strong></p>
        <hr>
        

        <!-- saisie utilisateur -->
        <article id="formulaire_connexion">
            <form >
                <fieldset>
                    <label for="email">Email :</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        required placeholder="Entrez votre e-mail" 
                        autocomplete="email">


                    <label for="mot_de_passe">Mot de passe :</label>
                    <input 
                        type="password"
                        id="mot_de_passe"
                        name="mot_de_passe" 
                        required placeholder="Entrez votre mot de passe" 
                        autocomplete="given-name">
                </fieldset>
                <input type="submit" value="Se connecter">
            </form>


        </article>
        <div class="messageSucces" id="messageSucces_connexion">
            Connexion réussi.
        </div>        

        <p class="ins_connex"><em>Vous n'avez pas de compte ?</em> Inscrivez - vous : <a href="inscription.html"> Inscription</a></p>

    </main>
    <!-- pied de page -->
    <footer class="container">
         
        <hr>

        <strong>Classe :EM-IN 1A</strong> 
        <p> Créé par Nolan De Almeida</p>
        


    </footer>
</body>
<script>
    // formulaire connexion 

    const formulaire_connexion = document.getElementById("formulaire_connexion");
    const messageSucces_connexion = document.getElementById("messageSucces_connexion");

    formulaire_connexion.addEventListener("submit", function(event){
        event.preventDefault();

        formulaire_connexion.style.display = 'none';
        messageSucces_connexion.style.display = 'block';
    });    
</script>

</html>
