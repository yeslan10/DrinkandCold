     <link rel="stylesheet" href="../css/style.css">

</head>
<body >
    
    <!-- entête -->
    <header class="container">
         <nav>
            <ul>
                <li><img src="../img/icone/390166.png" alt="icone"  class="logo"></li>
            </ul>
            <ul>

        <h1><strong>DrinkandCold</strong></h1>
        <p><strong>Site créé par Nolan De Almeida</strong></p>
        <i>Be Fraîche</i>
        <hr>


    </header>
    <main class = "container">

        <!-- titre -->
        <h2 class="menu_princ">Contact</h2>
        <p><strong>Dites - nous tout, nous sommes à l'écoute !</strong></p>
        <hr>

        <!-- Prénom, Nom. saisi de l'utilisateur -->
        <article id="formulaire_contact">
            <form>
                <fieldset>
                    <label for="prenom">Prénom *</label>
                    <input 
                        id="prenom"
                        name="prenom" 
                        required placeholder="Entrez votre prénom" 
                        autocomplete="given-name">
                    <label>
                    Nom
                    <input
                        name="nom"
                        placeholder="Entrez votre nom"
                        autocomplete="nom"
                    />
                    </label>

                    <!-- email, telephon. saisie de l'utilisateur -->

                    <label for="email">Email *</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        required placeholder="Entrez votre e-mail" 
                        autocomplete="email">
                    <label>
                    Téléphone
                    <input
                        name="Téléphone"
                        placeholder="Entrez votre numéro de téléphone"
                        autocomplete="telephone"
                    />
                    </label>    
                </fieldset>

            <!-- saisie message -->

                <textarea
                name="Message"
                placeholder="Ecrire le message..."
                aria-label="Ecrire le message..."
                ></textarea> 
        
                <input type="submit" value="Envoyer">

            </form>

            
        </article>
        <div class = "messageSucces" id="messageSucces_contact">
            Merci ! Nous avons bien reçu ton message. 
        </div>        



    </main>
    <!-- pied de page -->
    <footer class="container">
         
        <hr>
        <strong>Classe :EM-IN 1A</strong> 
        <p> Créé par Nolan De Almeida</p>

    </footer>
</body>
    <script>
    // Formulaire contact

    const formulaire_contact = document.getElementById("formulaire_contact");
    const messageSucces_contact = document.getElementById("messageSucces_contact");

    formulaire_contact.addEventListener("submit", function(event){
        event.preventDefault();

        formulaire_contact.style.display = 'none'
        messageSucces_contact.style.display = 'block'
    });    
</script>
</html>
